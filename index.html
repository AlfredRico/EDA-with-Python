
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e0e0e;
  color: #eaeaea;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 50px 30px;
}

/* ===== TYPO ===== */
h1 { font-size: 3rem; }
h2 {
  font-size: 1.9rem;
  margin-top: 60px;
  border-bottom: 1px solid #333;
  padding-left: 28px;
  position: relative;
}

p, li {
  color: #cfcfcf;
  font-size: 1.1rem;
  line-height: 1.9;
}

/* ===== CONTROLS ===== */
.controls {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
}

button {
  background: #2dd4bf;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
}
button:hover { background: #14b8a6; }

/* ===== COLLAPSE ===== */
.section.collapsed > .collapsible-content { display:none; }
.subsection.collapsed > .subsection-content { display:none; }

/* ===== ARROWS ===== */
.section > h2::before,
.subsection-header::before {
  content:"▸";
  position:absolute;
  left:0;
}

.section > h2::before { transform:rotate(90deg); }
.section.collapsed > h2::before { transform:rotate(0deg); }

.subsection-header {
  color:#9aaaff;
  padding-left:28px;
}
.subsection-header::before { transform:rotate(90deg); }
.subsection.collapsed > .subsection-header::before { transform:rotate(0deg); }

.summary-header {
  color:#ffcc66;
  padding-left:48px;
}
.summary-header::before {
  content:"▸";
  position:absolute;
  left:20px;
  transform:rotate(90deg);
}
.summary-header.collapsed::before {
  transform:rotate(0deg);
}

.summary-content { margin-left:48px; }
.summary-header.collapsed + .summary-content { display:none; }

/* ===== VIEW CODE ===== */
details summary {
  color:#2dd4bf;
  cursor:pointer;
}
details summary:hover { opacity:0.85; }

/* ===== TABLE ===== */
.df-table {
  border-collapse:collapse;
  width:100%;
}
.df-table th, .df-table td {
  border:1px solid #333;
  padding:8px;
}

/* ===== LIGHT MODE ===== */
body.light { background:#fff; color:#111; }
body.light p { color:#333; }

</style>

<script>

document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll(".section").forEach(s=>{
    const h=s.querySelector(":scope > h2");
    if(!h || h.id==="project-overview") return;
    s.classList.add("collapsed");
  });

  document.querySelectorAll(".subsection").forEach(s=>s.classList.add("collapsed"));
  document.querySelectorAll(".summary-header").forEach(s=>s.classList.add("collapsed"));

  document.querySelectorAll(".section > h2").forEach(h=>{
    if(h.id==="project-overview") return;
    h.onclick=()=>h.parentElement.classList.toggle("collapsed");
  });

  document.querySelectorAll(".subsection-header").forEach(h=>{
    h.onclick=()=>h.closest(".subsection").classList.toggle("collapsed");
  });

  document.querySelectorAll(".summary-header").forEach(h=>{
    h.onclick=(e)=>{e.stopPropagation();h.classList.toggle("collapsed");};
  });

});

let expanded=false;

function toggleAll(){
  expanded=!expanded;
  document.querySelectorAll(".section,.subsection").forEach(el=>{
    const h=el.querySelector(":scope > h2");
    if(h && h.id==="project-overview") return;
    el.classList.toggle("collapsed",!expanded);
  });
  document.querySelectorAll(".summary-header").forEach(el=>{
    el.classList.toggle("collapsed",!expanded);
  });
  document.getElementById("toggleBtn").textContent =
    expanded?"Collapse all":"Expand all";
}

function toggleTheme(){
  const b=document.body;
  const btn=document.getElementById("themeBtn");
  b.classList.toggle("light");
  btn.textContent=b.classList.contains("light")?"Night":"Day";
}

</script>

<style>

/* ===== PERFECT ARROW ALIGNMENT ===== */

/* SECTION */
.section > h2::before {
  left: 4px;
}

/* SUBSECTION */
.subsection-header {
  padding-left: 30px;
}
.subsection-header::before {
  left: 6px;
}

/* SUMMARY */
.summary-header {
  padding-left: 50px;
}
.summary-header::before {
  left: 22px;
}

/* FIX VERTICAL ALIGNMENT */
.section > h2::before,
.subsection-header::before,
.summary-header::before {
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

.section.collapsed > h2::before {
  transform: translateY(-50%) rotate(0deg);
}

.subsection.collapsed > .subsection-header::before {
  transform: translateY(-50%) rotate(0deg);
}

.summary-header.collapsed::before {
  transform: translateY(-50%) rotate(0deg);
}

</style>

<style>

/* ===== RESTORE ALL ARROWS ===== */

/* SECTION */
.section > h2::before {
  content: "▸";
  position: absolute;
  left: 4px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

/* COLLAPSED SECTION */
.section.collapsed > h2::before {
  transform: translateY(-50%) rotate(0deg);
}

/* SUBSECTION */
.subsection-header {
  padding-left: 30px;
  position: relative;
}

.subsection-header::before {
  content: "▸";
  position: absolute;
  left: 6px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

/* COLLAPSED SUBSECTION */
.subsection.collapsed > .subsection-header::before {
  transform: translateY(-50%) rotate(0deg);
}

/* SUMMARY */
.summary-header {
  padding-left: 50px;
  position: relative;
}

.summary-header::before {
  content: "▸";
  position: absolute;
  left: 22px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
}

/* COLLAPSED SUMMARY */
.summary-header.collapsed::before {
  transform: translateY(-50%) rotate(0deg);
}

/* ===== REMOVE PROJECT OVERVIEW ARROW ===== */
#project-overview::before {
  content: none !important;
}

</style>

<style>

/* ===== CLEAN CLICKABLE CURSOR ===== */

.section > h2,
.subsection-header,
.summary-header,
details summary {
  cursor: pointer;
}

/* REMOVE TEXT-SELECT FEEL */
.section > h2,
.subsection-header,
.summary-header {
  user-select: none;
}

/* KEEP PROJECT OVERVIEW NON-CLICKABLE */
#project-overview {
  cursor: default !important;
}

</style>

<style>

/* ===== GITHUB ICON FIX ===== */

}

.controls {

}

</style>

<style>

/* ===== HEADER SIZE NORMALIZATION ===== */

}

/* SUMMARY */

  font-size: 1.08rem !important;
}

/* ===== ARROW SCALING ===== */

/* SUBSECTION ARROW */
.subsection-header::before {
  font-size: 1rem;
}

/* SUMMARY ARROW */
.summary-header::before {

}

/* SECTION ARROW (slight bump) */
.section > h2::before {
  font-size: 1.05rem;
}

</style>

<style>

/* ===== CONTROLS LAYOUT FIX ===== */

.controls {
  display: flex;
  justify-content: flex-end;
  align-items: center;

  margin-bottom: 10px;

/* give buttons consistent spacing */
.controls button {
  white-space: nowrap;
}

/* GitHub icon fully visible */
.controls a {
  display: flex;
  align-items: center;
  padding-left: 4px;
}

.controls a svg {
  width: 26px;
  height: 26px;
  overflow: visible;
}

</style>

<style>

/* ===== VIEW CODE SIZE FIX ===== */

details summary {
  font-size: 1.05rem !important;
  font-weight: 500;
}

</style>

<style>

/* ===== GITHUB ICON TRUE FIX ===== */

.controls {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 14px;
}

/* prevent shrinking */
.controls a {
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
  min-width: 28px;
}

/* force full icon visibility */
.controls a svg {
  width: 26px;
  height: 26px;
  display: block;
  overflow: visible;
}

</style>

<style>

/* ===== CODE BLOCK SIZE FIX ===== */

pre {
  font-size: 1rem !important;
  line-height: 1.6 !important;
}

code {
  font-size: 1rem !important;
}

/* improve readability */
pre code {
  display: block;
}

</style>

<style>

pre {

pre code {

  display: block;

}

  border: 1px solid #ddd;

</style>

<style>

  flex-shrink: 0;
}

.controls button {

}

/* keep icon visible */

  height: 24px;

}

</style>

<style>

/* ===== CLEAN GITHUB ICON ===== */

.github-link {

  width: 100%;

}

</style>

<style>

/* ===== MATCH YOUR PROJECT CODE STYLE ===== */

pre {
  background: #111;
  padding: 16px 18px;
  border-radius: 8px;
  border: 1px solid #2a2a2a;
  overflow-x: auto;

  /* CRITICAL: preserve structure exactly */
  white-space: pre;
  tab-size: 4;

  /* readability */
  font-family: Consolas, Monaco, "Courier New", monospace;

  line-height: 1.65;
}

/* ensure code doesn't collapse spacing */
pre code {
  white-space: inherit;
  display: block;
}

/* spacing between logical blocks */
pre code br {
  display: block;
  margin-bottom: 6px;
}

/* LIGHT MODE */
body.light pre {
  background: #f5f5f5;
  border: 1px solid #ddd;
}

</style>


<style>

/* ===== RESTORE ORIGINAL CODE STRUCTURE ===== */

pre {
  white-space: pre !important;
  tab-size: 4;
  font-family: Consolas, Monaco, "Courier New", monospace;
}

/* prevent any inline styling interference */
pre code {
  all: unset;
  font-family: inherit;
}

</style>


<style>

/* ===== AUTHOR TEXT FIX ===== */

body.light p[style*="color:#aaa"] {
  color: #475569 !important;   /* slate-600 */

}

</style>


<style>

/* ===== INFO() OUTPUT FIX ===== */

body.light pre {
  background: #f8fafc !important;   /* soft gray */
  border: 1px solid #cbd5e1 !important;
  color: #0f172a !important;
}

/* improve readability inside */
body.light pre {
  font-size: 0.95rem;
  line-height: 1.65;
}

/* specifically for dense outputs like info() */
body.light pre[class*="dataframe"],
body.light pre:has(.df-table) {
  background: #ffffff !important;
}

</style>


<style>

/* ===== FORCE CONSISTENT WIDTH (MATCH LIGHTNING) ===== */

.container * {
  max-width: 100% !important;
  box-sizing: border-box;
}

/* prevent accidental narrowing */
.section,
.subsection,
.subsection-content,
.summary-content,
.results {
  width: 100% !important;
}

/* ensure tables and blocks don't shrink */
.df-table,
pre,
img {
  width: 100% !important;
  max-width: 100% !important;
}

</style>


<style>

/* ===== MATCH LIGHTNING FONT SYSTEM ===== */

ul {

}

.collapsible-content ul {
  padding-left: 22px !important;
}

</style>
